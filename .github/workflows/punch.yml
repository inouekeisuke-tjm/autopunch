name: Attendance Auto Punch

on:
  schedule:
    # 平日 08:40 JST (23:40 UTC 前日) を遅延対策で30分早める
    - cron: '10 23 * * 0-4'
    # 平日 21:00 JST (12:00 UTC) を遅延対策で30分早める
    - cron: '30 11 * * 1-5'
  workflow_dispatch:
    inputs:
      type:
        description: 'Punch type (attendance or clock-out)'
        required: true
        default: 'attendance'
        type: choice
        options:
          - attendance
          - clock-out

jobs:
  punch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Determine Type and Wait for Target Time
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Workflow dispatch, running immediately."
            echo "PUNCH_TYPE=${{ github.event.inputs.type }}" >> $GITHUB_ENV
          else
            # Get current JST hour
            JST_HOUR=$(TZ=Asia/Tokyo date +"%H")
            
            if [ "$JST_HOUR" -lt 12 ]; then
              # Morning: attendance at 08:40 JST
              PUNCH_TYPE="attendance"
              TARGET_H=8
              TARGET_M=40
            else
              # Evening: clock-out at 21:00 JST
              PUNCH_TYPE="clock-out"
              TARGET_H=21
              TARGET_M=0
            fi
            
            echo "Detected Type: $PUNCH_TYPE"
            echo "PUNCH_TYPE=$PUNCH_TYPE" >> $GITHUB_ENV
            
            # Target time in seconds for today
            TARGET_SEC=$(TZ=Asia/Tokyo date -d "today $TARGET_H:$TARGET_M:00" +"%s")
            CURRENT_SEC=$(TZ=Asia/Tokyo date +"%s")
            
            if [ "$CURRENT_SEC" -lt "$TARGET_SEC" ]; then
              WAIT_SEC=$((TARGET_SEC - CURRENT_SEC))
              echo "Waiting for ${WAIT_SEC} seconds to reach exactly $(printf "%02d:%02d" $TARGET_H $TARGET_M) JST..."
              sleep $WAIT_SEC
            else
              echo "Already past $(printf "%02d:%02d" $TARGET_H $TARGET_M) JST. Executing immediately."
            fi
          fi

      - name: Perform Punch
        env:
          PUNCH_URL: ${{ secrets.PUNCH_URL }}
          PUNCH_EMP_CODE: ${{ secrets.PUNCH_EMP_CODE }}
          PUNCH_PASSWORD: ${{ secrets.PUNCH_PASSWORD }}
        run: |
          echo "Starting $PUNCH_TYPE punch..."
          npx tsx scripts/punch.mts "$PUNCH_TYPE"
