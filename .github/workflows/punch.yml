name: Attendance Auto Punch

on:
  schedule:
    # 平日 07:01 JST (22:01 UTC 前日)
    - cron: '01 22 * * 0-4'
    # 平日 19:03 JST (10:03 UTC)
    - cron: '03 10 * * 1-5'
  workflow_dispatch:
    inputs:
      type:
        description: 'Punch type (attendance or clock-out)'
        required: true
        default: 'attendance'
        type: choice
        options:
          - attendance
          - clock-out

jobs:
  punch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Determine Type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Workflow dispatch, running immediately."
            echo "PUNCH_TYPE=${{ github.event.inputs.type }}" >> $GITHUB_ENV
          else
            # Get current JST hour
            JST_HOUR=$(TZ=Asia/Tokyo date +"%H")
            
            if [ "$JST_HOUR" -lt 12 ]; then
              PUNCH_TYPE="attendance"
            else
              PUNCH_TYPE="clock-out"
            fi
            
            echo "Detected Type: $PUNCH_TYPE"
            echo "PUNCH_TYPE=$PUNCH_TYPE" >> $GITHUB_ENV
          fi

      - name: Perform Punch
        env:
          PUNCH_URL: ${{ secrets.PUNCH_URL }}
          PUNCH_EMP_CODE: ${{ secrets.PUNCH_EMP_CODE }}
          PUNCH_PASSWORD: ${{ secrets.PUNCH_PASSWORD }}
          SKIP_HOLIDAY_CHECK: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "Starting $PUNCH_TYPE punch..."
          npx tsx scripts/punch.mts "$PUNCH_TYPE"
